name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    # Placeholder env so the app's env schemas parse and `next build` compiles
    # without any real Supabase/Stripe/Cloudflare credentials. These are NOT
    # secrets — they are syntactically valid throwaways used only at build time.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      MEDIA_PROVIDER: mock
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit (non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
